<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Aetheric — AI Service Assistant</title>
  <meta name="description" content="Aetheric AI-powered service marketplace. Order food, book rides, hire workers — all through voice and chat."/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@200..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: { "primary": "#121E31", "on-surface": "#121E31", "surface": "#F8FAFC" },
          fontFamily: { "headline": ["Manrope","sans-serif"], "body": ["Inter","sans-serif"] },
          borderRadius: {"DEFAULT":"1rem","lg":"2rem","xl":"3rem","full":"9999px"},
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
    body {
      background: radial-gradient(at 0% 0%, rgba(18,30,49,0.05) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(99,102,241,0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(18,30,49,0.05) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(99,102,241,0.08) 0px, transparent 50%), #f1f5f9;
      min-height: 100vh; position: relative; overflow: hidden; margin: 0; padding: 0;
    }
    #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; filter: blur(80px); opacity: 0.4; }
    .mesh-blob { position: absolute; border-radius: 50%; filter: blur(60px); animation: move 20s infinite alternate; }
    @keyframes move { from { transform: translate(0,0) scale(1); } to { transform: translate(20%,20%) scale(1.2); } }
    .glass-orb-container { position: relative; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; }
    .glass-orb-main {
      width: 140px; height: 140px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.1) 100%);
      backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); border-radius: 50%;
      box-shadow: 0 20px 50px rgba(18,30,49,0.1), inset 0 0 20px rgba(255,255,255,0.5);
      z-index: 2; animation: float 6s ease-in-out infinite;
    }
    .orb-glow-layer { position: absolute; width: 160%; height: 160%; background: radial-gradient(circle at center, rgba(99,102,241,0.25) 0%, transparent 70%); filter: blur(30px); animation: pulse-glow 4s ease-in-out infinite; z-index: 1; }
    .orb-core { position: absolute; width: 40%; height: 40%; background: linear-gradient(135deg,#6366f1,#4f46e5); border-radius: 50%; filter: blur(15px); opacity: 0.6; z-index: 3; animation: core-pulse 4s ease-in-out infinite; }
    @keyframes float { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-10px); } }
    @keyframes pulse-glow { 0%,100%{ opacity: 0.4; transform: scale(1); } 50%{ opacity: 0.7; transform: scale(1.1); } }
    @keyframes core-pulse { 0%,100%{ transform: scale(0.9); opacity: 0.5; } 50%{ transform: scale(1.1); opacity: 0.8; } }
    .orb-listening .glass-orb-main { box-shadow: 0 20px 50px rgba(99,102,241,0.3), inset 0 0 30px rgba(99,102,241,0.2); }
    .orb-listening .orb-glow-layer { animation: pulse-glow 1.5s ease-in-out infinite; }
    .orb-listening .orb-core { animation: core-pulse 1s ease-in-out infinite; opacity: 0.9; }
    .premium-card {
      background: rgba(255,255,255,0.4); backdrop-filter: blur(40px);
      border: 0.5px solid rgba(255,255,255,0.4);
      box-shadow: 0 10px 30px -5px rgba(0,0,0,0.03), inset 0 1px 1px rgba(255,255,255,0.8);
    }
    .voice-btn-premium {
      background: #121E31;
      box-shadow: 0 20px 40px -10px rgba(18,30,49,0.3), 0 0 0 1px rgba(255,255,255,0.1), inset 0 2px 4px rgba(255,255,255,0.2);
    }
    .voice-btn-premium.listening { background: #4f46e5; animation: btn-pulse 1.5s ease-in-out infinite; }
    @keyframes btn-pulse { 0%,100% { box-shadow: 0 20px 40px -10px rgba(79,70,229,0.4); } 50% { box-shadow: 0 20px 60px -5px rgba(79,70,229,0.6); } }
    .curved-line { position: absolute; stroke: rgba(18,30,49,0.03); stroke-width: 1.5; fill: none; }
    #ai-response { transition: all 0.3s ease; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="font-body text-on-surface flex flex-col items-center justify-between min-h-screen">

<!-- Mesh Background -->
<div class="mesh-bg">
  <div class="mesh-blob bg-blue-200 w-[500px] h-[500px] top-[-100px] left-[-100px]"></div>
  <div class="mesh-blob bg-indigo-100 w-[400px] h-[400px] bottom-[-50px] right-[-50px]" style="animation-delay:-5s;"></div>
</div>

<!-- Background Curves -->
<svg class="fixed top-0 left-0 w-full h-full -z-10" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <path class="curved-line" d="M -100,200 Q 150,50 400,300 T 600,600"></path>
  <path class="curved-line" d="M 500,100 Q 250,400 -50,250 T -200,600"></path>
</svg>

<!-- Header -->
<header class="w-full flex justify-between items-center px-8 h-20 bg-transparent">
  <button class="p-2 transition-opacity active:opacity-50" onclick="window.location.href='/worker'">
    <span class="material-symbols-outlined text-primary !font-[300]">menu</span>
  </button>
  <div class="font-headline font-extrabold text-primary text-xl tracking-tight">Aetheric</div>
  <button class="p-1 rounded-full bg-primary text-white w-9 h-9 flex items-center justify-center shadow-lg active:scale-90 transition-transform" onclick="window.location.href='/chat'">
    <span class="material-symbols-outlined text-[20px] !font-[600]">chat_bubble</span>
  </button>
</header>

<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-center w-full max-w-lg px-8">
  <!-- Glass Orb -->
  <div class="glass-orb-container mb-12" id="orb-container">
    <div class="orb-glow-layer"></div>
    <div class="glass-orb-main"></div>
    <div class="orb-core"></div>
  </div>

  <!-- Typography -->
  <div class="text-center mb-8 space-y-4">
    <h1 class="font-headline text-[2.75rem] font-extrabold tracking-[-0.03em] text-primary leading-[1.05]">
      Say anything to<br/>Aetheric Assistant
    </h1>
  </div>

  <!-- AI Response Area -->
  <div id="ai-response" class="w-full flex flex-col items-center gap-4 mb-4" style="display:none;">
    <div class="bg-white/60 backdrop-blur-2xl px-6 py-4 rounded-2xl border border-white/60 shadow-md w-full max-w-md">
      <p id="ai-response-text" class="text-[14px] font-medium text-primary/80 leading-relaxed"></p>
    </div>
  </div>

  <!-- Status -->
  <div class="w-full flex flex-col items-center gap-6">
    <div class="bg-white/40 backdrop-blur-2xl px-7 py-3 rounded-full border border-white/60 shadow-sm">
      <p id="status-text" class="text-[14px] font-semibold text-primary/70 tracking-tight">Tap the button to start recording</p>
    </div>
    <div id="timer" class="text-primary/40 font-mono text-sm tracking-[0.2em] font-medium">00:00</div>
  </div>
</main>

<!-- Footer Voice UI -->
<div class="w-full max-w-lg pb-14 flex flex-col items-center gap-8">
  <!-- Text Input -->
  <div class="w-full px-8">
    <div class="bg-white/40 backdrop-blur-2xl rounded-full border border-white/60 shadow-sm flex items-center px-4 py-2 gap-2">
      <input id="text-input" type="text" placeholder="Type a message..." 
        class="flex-1 bg-transparent border-none focus:ring-0 text-sm font-body text-primary placeholder:text-primary/30"
        onkeydown="if(event.key==='Enter') sendTextMessage()"/>
      <button onclick="sendTextMessage()" class="p-2 rounded-full bg-primary/10 hover:bg-primary/20 transition-colors">
        <span class="material-symbols-outlined text-primary text-[18px]">send</span>
      </button>
    </div>
  </div>

  <!-- Voice Button -->
  <div class="relative flex items-center justify-center">
    <div id="ping-ring" class="absolute w-32 h-32 rounded-full border border-primary/10 animate-ping opacity-20"></div>
    <button id="voice-btn" class="w-24 h-24 rounded-full voice-btn-premium flex items-center justify-center active:scale-95 transition-all duration-300" onclick="toggleVoice()">
      <span id="mic-icon" class="material-symbols-outlined text-white text-4xl !font-[200]" style="font-variation-settings:'FILL' 1;">mic</span>
    </button>
  </div>

  <!-- Quick Action Cards -->
  <div class="w-full grid grid-cols-2 gap-4 px-8">
    <div class="premium-card p-6 rounded-[2.5rem] flex flex-col items-start gap-4 transition-all active:scale-95 cursor-pointer" onclick="quickAction('Book a ride to the nearest metro station')">
      <div class="w-10 h-10 rounded-full bg-white/50 flex items-center justify-center shadow-sm">
        <span class="material-symbols-outlined text-primary/80 text-xl !font-[300]">local_taxi</span>
      </div>
      <p class="text-sm font-bold text-primary tracking-tight">Book a ride</p>
    </div>
    <div class="premium-card p-6 rounded-[2.5rem] flex flex-col items-start gap-4 transition-all active:scale-95 cursor-pointer" onclick="quickAction('I am hungry, show me nearby restaurants')">
      <div class="w-10 h-10 rounded-full bg-white/50 flex items-center justify-center shadow-sm">
        <span class="material-symbols-outlined text-primary/80 text-xl !font-[300]">restaurant</span>
      </div>
      <p class="text-sm font-bold text-primary tracking-tight">Find dinner</p>
    </div>
  </div>
</div>

<!-- Background Blurs -->
<div class="fixed top-1/3 -left-20 w-80 h-80 bg-indigo-200/20 rounded-full blur-[100px] -z-10"></div>
<div class="fixed bottom-1/4 -right-20 w-72 h-72 bg-white/60 rounded-full blur-[100px] -z-10"></div>

<script>
  const API_BASE = window.location.origin;
  let sessionId = localStorage.getItem('aetheric_session') || crypto.randomUUID();
  localStorage.setItem('aetheric_session', sessionId);

  let isListening = false;
  let recognition = null;
  let timerInterval = null;
  let seconds = 0;

  // ── WebSocket Connection ──
  let ws = null;
  function connectWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${protocol}://${window.location.host}/ws`);
    ws.onopen = () => {
      ws.send(JSON.stringify({ type: 'register', payload: { role: 'user', id: sessionId, name: 'User' } }));
    };
    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.type === 'chat_response') showAIResponse(data.reply);
      if (data.type === 'booking_update') showAIResponse(data.message);
    };
    ws.onclose = () => setTimeout(connectWebSocket, 3000);
  }
  connectWebSocket();

  // ── Speech Recognition ──
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-IN';

    recognition.onresult = (event) => {
      let transcript = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        transcript += event.results[i][0].transcript;
      }
      document.getElementById('text-input').value = transcript;
      if (event.results[event.resultIndex].isFinal) {
        stopListening();
        sendMessage(transcript);
      }
    };

    recognition.onerror = (e) => { console.error('Speech error:', e); stopListening(); };
    recognition.onend = () => { if (isListening) stopListening(); };
  }

  function toggleVoice() {
    if (isListening) { stopListening(); } 
    else { startListening(); }
  }

  function startListening() {
    if (!recognition) { alert('Speech recognition not supported in this browser.'); return; }
    isListening = true;
    recognition.start();
    document.getElementById('voice-btn').classList.add('listening');
    document.getElementById('orb-container').classList.add('orb-listening');
    document.getElementById('mic-icon').textContent = 'stop';
    document.getElementById('status-text').textContent = 'Listening...';
    seconds = 0;
    timerInterval = setInterval(() => {
      seconds++;
      const m = String(Math.floor(seconds/60)).padStart(2,'0');
      const s = String(seconds%60).padStart(2,'0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }, 1000);
  }

  function stopListening() {
    isListening = false;
    if (recognition) recognition.stop();
    document.getElementById('voice-btn').classList.remove('listening');
    document.getElementById('orb-container').classList.remove('orb-listening');
    document.getElementById('mic-icon').textContent = 'mic';
    document.getElementById('status-text').textContent = 'Processing...';
    clearInterval(timerInterval);
  }

  function sendTextMessage() {
    const input = document.getElementById('text-input');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    sendMessage(msg);
  }

  function quickAction(msg) { sendMessage(msg); }

  async function sendMessage(message) {
    document.getElementById('status-text').textContent = 'Thinking...';
    try {
      const res = await fetch(`${API_BASE}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, sessionId, userId: sessionId })
      });
      const data = await res.json();
      showAIResponse(data.reply, data.suggestions);
    } catch (err) {
      showAIResponse('Sorry, I could not connect to the server. Please try again.', []);
    }
  }

  function showAIResponse(text, suggestions = []) {
    const container = document.getElementById('ai-response');
    const textEl = document.getElementById('ai-response-text');
    container.style.display = 'flex';
    container.classList.add('fade-in');
    // Simple markdown-like formatting
    textEl.innerHTML = text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br/>');
    document.getElementById('status-text').textContent = 'Tap the button to ask again';
    document.getElementById('timer').textContent = '00:00';
    seconds = 0;

    // Show suggestion chips if any
    if (suggestions && suggestions.length > 0) {
      const existing = document.getElementById('suggestion-chips');
      if (existing) existing.remove();
      const chips = document.createElement('div');
      chips.id = 'suggestion-chips';
      chips.className = 'flex flex-wrap gap-2 px-4';
      suggestions.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'px-4 py-2 bg-white/50 backdrop-blur-xl rounded-full text-xs font-semibold text-primary/70 hover:bg-white/70 transition-colors border border-white/50';
        btn.textContent = s;
        btn.onclick = () => sendMessage(s);
        chips.appendChild(btn);
      });
      container.appendChild(chips);
    }
  }
</script>
<script src="/particles.js"></script>
</body>
</html>
