<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Aetheric AI — Login</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='g' cx='30%25' cy='30%25' r='70%25'%3E%3Cstop offset='0%25' stop-color='%23ffffff'/%3E%3Cstop offset='50%25' stop-color='%23e0e0ff'/%3E%3Cstop offset='100%25' stop-color='%239990ff'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='14' fill='url(%23g)'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23ffffff' opacity='0.9'/%3E%3C/svg%3E"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="/auth.js" defer></script>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { "primary":"#121E31","accent":"#6366f1","surface":"#F8FAFC" },
          fontFamily: { "headline":["Manrope","sans-serif"],"body":["Inter","sans-serif"] },
        },
      },
    }
  </script>
  <style>
    body { background: #0A0F1E; min-height:100vh; display:flex; align-items:center; justify-content:center; margin:0; overflow:hidden; }
    .glass-login { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5); }
    .orb { position:fixed; width:800px; height:800px; border-radius:50%; background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%); z-index:-1; filter:blur(60px); top: -20%; right: -20%; animation: float 15s infinite alternate ease-in-out; }
    .orb-2 { position:fixed; width:600px; height:600px; border-radius:50%; background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%); z-index:-1; filter:blur(60px); bottom: -10%; left: -10%; animation: float 18s infinite alternate-reverse ease-in-out; }
    @keyframes float { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(10%, 10%) scale(1.1)} }
    .input-field { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: white; transition: all 0.3s ease; }
    .input-field:focus { background: rgba(255,255,255,0.12); border-color: rgba(99,102,241,0.5); box-shadow: 0 0 20px rgba(99,102,241,0.2); }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="font-body text-white antialiased">
  <div class="orb"></div>
  <div class="orb-2"></div>
  
  <div class="glass-login max-w-md w-full mx-6 p-10 md:p-12 rounded-[2.5rem] md:rounded-[3.5rem] text-center fade-in">
    <div class="mb-10 md:mb-12">
        <div class="w-16 h-16 bg-white rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-2xl rotate-3 relative">
             <div class="absolute inset-0 bg-accent/20 blur-xl rounded-full"></div>
             <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-primary to-accent relative z-10"></div>
        </div>
        <h1 class="font-headline font-black text-3xl md:text-4xl tracking-tight mb-3 text-white">Welcome Back</h1>
        <p class="text-white/50 text-sm font-medium tracking-wide">Enter the Aetheric Universe</p>
    </div>

    <!-- Google Login -->
    <button onclick="loginWithGoogle()" class="w-full py-4.5 px-6 rounded-2xl bg-white text-primary font-extrabold shadow-2xl hover:scale-[1.03] active:scale-[0.97] transition-all flex items-center justify-center gap-4 mb-8">
       <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
       <span class="text-sm">Continue with Google</span>
    </button>

    <div class="flex items-center gap-4 mb-8">
        <hr class="flex-1 border-white/10">
        <span class="text-[9px] font-black uppercase tracking-[0.2em] text-white/40">OR USE PHONE</span>
        <hr class="flex-1 border-white/10">
    </div>

    <!-- Phone Login -->
    <div class="space-y-4">
        <div class="relative group">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-white/30 group-focus-within:text-accent transition-colors">phone</span>
            <input type="tel" placeholder="+91 XXXX XXXX" class="w-full pl-14 pr-6 py-4.5 rounded-2xl input-field text-sm font-bold placeholder:text-white/20 outline-none">
        </div>
        <button class="w-full py-4.5 px-6 rounded-2xl bg-white/5 text-white/80 font-bold border border-white/10 hover:bg-white/10 transition-all text-sm">
            Get OTP
        </button>
    </div>

    <div class="mt-12">
        <a href="/" class="text-white/30 hover:text-white transition-colors text-xs font-bold uppercase tracking-widest flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-[14px]">arrow_back</span> Back to home
        </a>
    </div>
  </div>

  <script src="/particles.js"></script>
</body>
</html>
