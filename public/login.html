<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Aetheric AI — Login</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='g' cx='30%25' cy='30%25' r='70%25'%3E%3Cstop offset='0%25' stop-color='%23ffffff'/%3E%3Cstop offset='50%25' stop-color='%23e0e0ff'/%3E%3Cstop offset='100%25' stop-color='%239990ff'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='14' fill='url(%23g)'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23ffffff' opacity='0.9'/%3E%3C/svg%3E"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="/auth.js" defer></script>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { "primary":"#121E31","accent":"#6366f1","surface":"#F8FAFC" },
          fontFamily: { "headline":["Manrope","sans-serif"],"body":["Inter","sans-serif"] },
        },
      },
    }
  </script>
  <style>
    body { background-color:#f1f5f9; background-image:radial-gradient(at 0% 0%,hsla(253,16%,7%,1) 0,transparent 50%),radial-gradient(at 100% 0%,hsla(225,39%,30%,1) 0,transparent 50%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .glass-login { background:rgba(255,255,255,0.05);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.1);box-shadow:0 30px 100px rgba(0,0,0,0.5); }
    .orb { position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,0.2) 0%,transparent 70%);z-index:-1;filter:blur(40px);animation:float 20s infinite alternate ease-in-out; }
    @keyframes float { 0%{transform:translate(-10%,-10%) scale(1)} 100%{transform:translate(20%,20%) scale(1.2)} }
  </style>
</head>
<body class="font-body text-white antialiased">
  <div class="orb"></div>
  
  <div class="glass-login max-w-md w-full mx-6 p-10 rounded-[3rem] text-center fade-in">
    <div class="mb-10">
        <div class="w-16 h-16 bg-white rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-2xl rotate-3">
             <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-primary to-accent"></div>
        </div>
        <h1 class="font-headline font-extrabold text-4xl tracking-tight mb-3">Welcome Back</h1>
        <p class="text-white/40 text-sm font-medium">Access your global AI service dashboard</p>
    </div>

    <!-- Google Login -->
    <button onclick="loginWithGoogle()" class="w-full py-4 px-6 rounded-2xl bg-white text-primary font-bold shadow-xl hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-4 mb-6">
       <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
       <span>Continue with Google</span>
    </button>

    <div class="flex items-center gap-4 mb-6 opacity-30">
        <hr class="flex-1 border-white/20">
        <span class="text-[10px] font-bold uppercase tracking-widest">Or use phone</span>
        <hr class="flex-1 border-white/20">
    </div>

    <!-- Phone Login Mock (Placeholder for simplicity) -->
    <div class="space-y-4">
        <div class="relative">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-white/30">phone</span>
            <input type="tel" placeholder="+91 00000 00000" class="w-full pl-14 pr-6 py-4 rounded-2xl bg-white/5 border border-white/10 text-white placeholder:text-white/20 focus:ring-2 focus:ring-accent/40 focus:border-accent/40 transition-all">
        </div>
        <button class="w-full py-4 px-6 rounded-2xl bg-white/10 text-white/60 font-bold border border-white/10 hover:bg-white/20 transition-all">
            Get OTP
        </button>
    </div>

    <div class="mt-12">
        <a href="/" class="text-white/30 hover:text-white transition-colors text-xs font-bold uppercase tracking-widest flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-[14px]">arrow_back</span> Back to home
        </a>
    </div>
  </div>

  <script src="/particles.js"></script>
</body>
</html>
