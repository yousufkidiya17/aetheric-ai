<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Aetheric AI — Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="/auth.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&family=Inter:wght@500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <style>
    body { background: #0A0F1E; min-height:100vh; display:flex; align-items:center; justify-content:center; margin:0; overflow:hidden; font-family: 'Inter', sans-serif; }
    .glass-login { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5); z-index: 10; position: relative; }
    .orb { position:fixed; width:800px; height:800px; border-radius:50%; background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%); z-index:-1; filter:blur(60px); top: -20%; right: -20%; animation: float 15s infinite alternate ease-in-out; }
    .orb-2 { position:fixed; width:600px; height:600px; border-radius:50%; background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%); z-index:-1; filter:blur(60px); bottom: -10%; left: -10%; animation: float 18s infinite alternate-reverse ease-in-out; }
    @keyframes float { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(10%, 10%) scale(1.1)} }
    .input-field { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: white; }
  </style>
</head>
<body class="text-white">
  <div class="orb"></div>
  <div class="orb-2"></div>
  
  <div class="glass-login max-w-md w-full mx-6 p-12 rounded-[3.5rem] text-center">
    <div class="mb-12">
        <div class="w-16 h-16 bg-white rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-2xl rotate-3 relative">
             <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500"></div>
        </div>
        <h1 class="font-['Manrope'] font-black text-4xl tracking-tight mb-2">Welcome Back</h1>
        <p class="text-white/50 text-sm font-medium">Access your global AI dashboard</p>
    </div>

    <button onclick="loginWithGoogle()" class="w-full py-4 px-6 rounded-2xl bg-white text-[#121E31] font-bold shadow-2xl hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-4 mb-8">
       <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
       <span>Continue with Google</span>
    </button>

    <div class="flex items-center gap-4 mb-8">
        <hr class="flex-1 border-white/10">
        <span class="text-[9px] font-bold uppercase tracking-[0.2em] text-white/30">OR USE PHONE</span>
        <hr class="flex-1 border-white/10">
    </div>

    <div class="space-y-4">
        <input type="tel" placeholder="+91 XXXX XXXX" class="w-full px-6 py-4 rounded-2xl input-field text-sm font-bold placeholder:text-white/20 outline-none">
        <button class="w-full py-4 px-6 rounded-2xl bg-white/5 text-white/80 font-bold border border-white/10 hover:bg-white/10 transition-all text-sm">
            Get OTP
        </button>
    </div>
  </div>
</body>
</html>
