<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Aetheric — AI Chat</title>
  <meta name="description" content="Chat with Aetheric AI to order food, book rides, and hire workers."/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { "primary":"#121E31","accent":"#6366f1","surface":"#F8FAFC" },
        fontFamily: { "headline":["Manrope","sans-serif"],"body":["Inter","sans-serif"] }
      }}
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
    body { background: radial-gradient(at 0% 0%,rgba(18,30,49,0.05) 0,transparent 50%),radial-gradient(at 100% 0%,rgba(99,102,241,0.08) 0,transparent 50%),#f1f5f9; min-height:100vh; margin:0; overflow-x:hidden; }
    #particle-canvas { position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none; }
    .glass-card { background:rgba(255,255,255,0.4);backdrop-filter:blur(40px);border:0.5px solid rgba(255,255,255,0.4);box-shadow:0 10px 30px -5px rgba(0,0,0,0.03),inset 0 1px 1px rgba(255,255,255,0.8); }
    .ai-bubble { background-color:#545F75;color:white;border-bottom-left-radius:4px; }
    .user-bubble { background:rgba(255,255,255,0.6);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.5);color:#121E31;border-bottom-right-radius:4px; }
    .mcp-card { background:linear-gradient(135deg,rgba(255,255,255,0.7),rgba(255,255,255,0.4));backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.5); }
    .suggestion-chip { background:rgba(255,255,255,0.5);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.4); }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation:fadeIn 0.3s ease-out; }
    @keyframes typing { 0%{opacity:0.3} 50%{opacity:1} 100%{opacity:0.3} }
    .typing-dot { animation:typing 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay:0.2s; }
    .typing-dot:nth-child(3) { animation-delay:0.4s; }

    /* Desktop: Chat centered like WhatsApp Web */
    @media (min-width: 768px) {
      .chat-container { max-width:900px; margin:0 auto; display:flex; height:calc(100vh - 80px); }
      .chat-sidebar { width:280px; border-right:1px solid rgba(255,255,255,0.3); padding:1.5rem; display:flex; flex-direction:column; gap:1rem; }
      .chat-main { flex:1; display:flex; flex-direction:column; }
    }
    @media (max-width: 767px) {
      .chat-sidebar { display:none !important; }
      .chat-main { height:calc(100vh - 80px); }
    }
  </style>
</head>
<body class="font-body text-primary antialiased">

<!-- Header -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 md:px-12 h-20 bg-white/40 backdrop-blur-xl border-b border-white/20">
  <div class="flex items-center gap-3">
    <button class="p-2 rounded-xl hover:bg-white/50 transition-colors" onclick="window.location.href='/'">
      <span class="material-symbols-outlined text-primary/70">arrow_back</span>
    </button>
    <span class="font-headline font-extrabold text-primary text-xl tracking-tight">Aetheric</span>
    <span class="hidden md:inline text-primary/30 text-sm">— AI Chat</span>
  </div>
  <div class="flex items-center gap-3">
    <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/50 border border-white/40">
      <div id="ws-status" class="w-2 h-2 bg-yellow-400 rounded-full"></div>
      <span id="ws-label" class="text-[10px] font-bold text-primary/50 uppercase tracking-wider">Connecting</span>
    </div>
    <button id="voice-toggle" onclick="toggleVoice()" class="hidden md:flex w-10 h-10 rounded-full bg-primary/5 items-center justify-center hover:bg-primary/10 transition-colors">
      <span class="material-symbols-outlined text-primary/60 text-[20px]">mic</span>
    </button>
  </div>
</header>

<!-- Chat Layout -->
<div class="chat-container pt-20">
  
  <!-- Desktop Sidebar -->
  <div class="chat-sidebar">
    <h3 class="font-headline font-bold text-primary/40 text-[10px] uppercase tracking-[0.2em]">Quick Actions</h3>
    <button onclick="sendMessage('Show me nearby restaurants')" class="glass-card p-4 rounded-2xl flex items-center gap-3 hover:bg-white/60 transition-all text-left group">
      <span class="material-symbols-outlined text-orange-500/60 group-hover:text-orange-500 transition-colors">restaurant</span>
      <span class="text-sm font-medium text-primary/70">Order Food</span>
    </button>
    <button onclick="sendMessage('Book a ride to airport')" class="glass-card p-4 rounded-2xl flex items-center gap-3 hover:bg-white/60 transition-all text-left group">
      <span class="material-symbols-outlined text-blue-500/60 group-hover:text-blue-500 transition-colors">local_taxi</span>
      <span class="text-sm font-medium text-primary/70">Book Ride</span>
    </button>
    <button onclick="sendMessage('Find a plumber near me')" class="glass-card p-4 rounded-2xl flex items-center gap-3 hover:bg-white/60 transition-all text-left group">
      <span class="material-symbols-outlined text-green-500/60 group-hover:text-green-500 transition-colors">plumbing</span>
      <span class="text-sm font-medium text-primary/70">Hire Worker</span>
    </button>
    <button onclick="sendMessage('I need an electrician urgently')" class="glass-card p-4 rounded-2xl flex items-center gap-3 hover:bg-white/60 transition-all text-left group">
      <span class="material-symbols-outlined text-yellow-500/60 group-hover:text-yellow-500 transition-colors">electrical_services</span>
      <span class="text-sm font-medium text-primary/70">Electrician</span>
    </button>
    <div class="mt-auto glass-card p-4 rounded-2xl">
      <p class="text-[10px] font-bold text-primary/30 uppercase tracking-wider mb-1">Powered by</p>
      <p class="text-xs font-semibold text-primary/60">Mistral AI + MCP</p>
    </div>
  </div>

  <!-- Chat Main Area -->
  <div class="chat-main flex flex-col">
    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4">
      <div class="flex w-full justify-start fade-in">
        <div class="ai-bubble max-w-[85%] md:max-w-[70%] p-4 rounded-t-2xl rounded-br-2xl text-sm font-medium leading-relaxed shadow-sm">
          Hello! I'm Aetheric ✨ I can help you order food, book rides, or find service professionals. What do you need today?
        </div>
      </div>
    </div>

    <!-- Suggestions -->
    <div id="suggestions" class="px-4 md:px-6 pb-2 flex flex-wrap gap-2">
      <button onclick="sendMessage('I\'m hungry')" class="suggestion-chip px-4 py-2 rounded-full text-xs font-bold text-primary/70 hover:bg-white/70 active:scale-95 transition-all">🍕 I'm hungry</button>
      <button onclick="sendMessage('Book a ride')" class="suggestion-chip px-4 py-2 rounded-full text-xs font-bold text-primary/70 hover:bg-white/70 active:scale-95 transition-all">🚕 Book a ride</button>
      <button onclick="sendMessage('Need a plumber')" class="suggestion-chip px-4 py-2 rounded-full text-xs font-bold text-primary/70 hover:bg-white/70 active:scale-95 transition-all">🔧 Need a plumber</button>
    </div>

    <!-- Input Bar -->
    <div class="p-4 md:p-6 bg-white/30 border-t border-white/30">
      <div class="relative flex items-center gap-3">
        <button id="mic-btn" onclick="toggleVoice()" class="md:hidden w-11 h-11 rounded-full bg-primary/5 flex items-center justify-center active:scale-90 transition-all flex-shrink-0">
          <span class="material-symbols-outlined text-primary/60 text-[20px]">mic</span>
        </button>
        <div class="relative flex-1">
          <input type="text" id="chat-input" placeholder="Type a message..." 
            class="w-full py-4 pl-5 pr-14 rounded-full bg-white/70 border border-white/60 focus:outline-none focus:ring-2 focus:ring-accent/20 text-primary placeholder:text-primary/40 font-medium text-sm md:text-base"
            onkeydown="if(event.key==='Enter')sendMessage()"/>
          <button onclick="sendMessage()" id="send-btn"
            class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center disabled:opacity-50 transition-all active:scale-95 hover:bg-primary/90">
            <span class="material-symbols-outlined text-[18px]">send</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;
let sessionId = localStorage.getItem('aetheric_session') || null;
let ws = null;

// WebSocket
function connectWS() {
  const proto = window.location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${window.location.host}/ws`);
  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'register', payload: { role: 'user', id: 'web_user_' + Date.now() } }));
    document.getElementById('ws-status').className = 'w-2 h-2 bg-emerald-500 rounded-full';
    document.getElementById('ws-label').textContent = 'Connected';
  };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'booking_update') {
      addMessage('assistant', data.message || 'Booking updated!');
    }
  };
  ws.onclose = () => {
    document.getElementById('ws-status').className = 'w-2 h-2 bg-red-400 rounded-full';
    document.getElementById('ws-label').textContent = 'Offline';
    setTimeout(connectWS, 3000);
  };
}
connectWS();

async function sendMessage(text) {
  const input = document.getElementById('chat-input');
  const message = text || input.value.trim();
  if (!message) return;
  input.value = '';

  addMessage('user', message);
  showTyping();
  document.getElementById('suggestions').innerHTML = '';

  try {
    const res = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, sessionId, userId: 'web_user' })
    });
    const data = await res.json();
    sessionId = data.sessionId;
    localStorage.setItem('aetheric_session', sessionId);
    hideTyping();

    addMessage('assistant', data.reply || 'I understand. How can I help?');

    if (data.mcpData) renderMCPCard(data.mcpData, data.intent);
    if (data.suggestions && data.suggestions.length > 0) renderSuggestions(data.suggestions);
  } catch (err) {
    hideTyping();
    addMessage('assistant', 'Sorry, something went wrong. Please try again.');
  }
}

function addMessage(role, content) {
  const container = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'} fade-in`;
  
  const bubble = document.createElement('div');
  bubble.className = `max-w-[85%] md:max-w-[70%] p-4 text-sm font-medium leading-relaxed shadow-sm ${
    role === 'user' ? 'user-bubble rounded-t-2xl rounded-bl-2xl' : 'ai-bubble rounded-t-2xl rounded-br-2xl'
  }`;
  bubble.innerHTML = formatText(content);
  wrapper.appendChild(bubble);
  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;
}

function formatText(text) {
  return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>').replace(/_(.*?)_/g, '<em>$1</em>');
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.id = 'typing-indicator';
  div.className = 'flex w-full justify-start fade-in';
  div.innerHTML = '<div class="ai-bubble rounded-2xl rounded-bl-none p-4 shadow-sm flex items-center gap-1.5"><div class="w-2 h-2 bg-white/60 rounded-full typing-dot"></div><div class="w-2 h-2 bg-white/60 rounded-full typing-dot"></div><div class="w-2 h-2 bg-white/60 rounded-full typing-dot"></div></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function renderMCPCard(data, intent) {
  if (!data || !data.success) return;
  const container = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'flex w-full justify-start fade-in';
  
  let html = '<div class="max-w-[90%] md:max-w-[75%] space-y-3">';
  
  if (data.restaurants) {
    data.restaurants.forEach(r => {
      html += `<div class="mcp-card p-4 rounded-2xl"><div class="flex justify-between items-start"><h4 class="font-bold text-primary">${r.name}</h4><span class="text-xs font-bold text-primary/50">${r.rating}⭐</span></div><p class="text-xs text-primary/60 mt-1">${r.cuisine} · ${r.deliveryTime} · ${r.priceRange}</p>${r.popularItems ? '<div class="flex flex-wrap gap-1.5 mt-2">'+r.popularItems.map(i=>'<span class="text-[10px] bg-white/60 px-2 py-1 rounded-full text-primary/70 font-medium">'+i+'</span>').join('')+'</div>':''}</div>`;
    });
  }
  if (data.estimates) {
    data.estimates.forEach(e => {
      html += `<div class="mcp-card p-4 rounded-2xl flex items-center gap-4"><span class="text-2xl">${e.icon}</span><div class="flex-1"><h4 class="font-bold text-primary text-sm">${e.rideType}</h4><p class="text-xs text-primary/50">${e.eta} · ${e.distance}</p></div><span class="font-bold text-primary">${e.fare}</span></div>`;
    });
  }
  if (data.ride) {
    const r = data.ride;
    html += `<div class="mcp-card p-5 rounded-2xl border-l-4 border-accent"><h4 class="font-bold text-primary mb-2">🚕 Ride Confirmed!</h4><p class="text-sm text-primary/70">Driver: ${r.driver}</p><p class="text-sm text-primary/70">Vehicle: ${r.vehicle}</p><p class="text-sm text-primary/70">OTP: <span class="font-bold text-accent">${r.otp}</span></p><p class="text-sm text-primary/70">Fare: ${r.fare} · ETA: ${r.eta}</p></div>`;
  }
  if (data.workers) {
    data.workers.forEach(w => {
      html += `<div class="mcp-card p-4 rounded-2xl"><div class="flex items-center gap-3 mb-2"><span class="text-2xl">${w.photo}</span><div><h4 class="font-bold text-primary text-sm">${w.name}</h4><p class="text-xs text-primary/50">${w.skill} · ${w.experience}</p></div></div><div class="flex items-center justify-between"><span class="text-xs font-bold text-primary/60">${w.rating} · ${w.hourlyRate}</span><span class="text-xs ${w.verified.includes('✅') ? 'text-green-600' : 'text-primary/40'} font-bold">${w.verified}</span></div></div>`;
    });
  }
  if (data.recommendations) {
    data.recommendations.forEach(r => {
      html += `<div class="mcp-card p-4 rounded-2xl flex items-center justify-between"><div><h4 class="font-bold text-primary text-sm">${r.item}</h4><p class="text-xs text-primary/50">${r.restaurant} · ${r.deliveryTime}</p></div><div class="text-right"><span class="font-bold text-primary">${r.price}</span><span class="text-xs ml-2">${r.veg}</span></div></div>`;
    });
  }
  if (data.order) {
    const o = data.order;
    html += `<div class="mcp-card p-5 rounded-2xl border-l-4 border-green-500"><h4 class="font-bold text-primary mb-2">🎉 Order Confirmed!</h4><p class="text-sm text-primary/70">From: ${o.restaurant}</p><p class="text-sm text-primary/70">Items: ${Array.isArray(o.items)?o.items.join(', '):o.items}</p><p class="text-sm font-bold text-primary mt-1">Total: ${o.grandTotal}</p><p class="text-xs text-primary/50 mt-1">Delivery: ${o.estimatedDelivery}</p></div>`;
  }
  
  html += '</div>';
  wrapper.innerHTML = html;
  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;
}

function renderSuggestions(suggestions) {
  const el = document.getElementById('suggestions');
  el.innerHTML = suggestions.map(s => 
    `<button onclick="sendMessage('${s.replace(/'/g,"\\'")}')" class="suggestion-chip px-4 py-2 rounded-full text-xs font-bold text-primary/70 hover:bg-white/70 active:scale-95 transition-all">${s}</button>`
  ).join('');
}

// Voice
let recognition;
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) { alert('Voice not supported'); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!recognition) recognition = new SR();
  recognition.lang = 'en-IN';
  recognition.onresult = (e) => { document.getElementById('chat-input').value = e.results[0][0].transcript; sendMessage(); };
  recognition.start();
  document.getElementById('mic-btn')?.classList.add('bg-red-100');
  recognition.onend = () => document.getElementById('mic-btn')?.classList.remove('bg-red-100');
}

// Load initial query from URL
window.addEventListener('load', () => {
  const q = new URLSearchParams(window.location.search).get('q');
  if (q) sendMessage(q);
});
</script>
<script src="/particles.js"></script>
</body>
</html>
